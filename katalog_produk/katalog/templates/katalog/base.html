<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}{{ judul_halaman }}{% endblock %} | TokoKita</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=DM+Serif+Display&display=swap" rel="stylesheet">
    <style>
        :root {
            --navy:        #0f1f38;
            --blue:        #1a56db;
            --blue-hover:  #1347c0;
            --blue-light:  #e8f0fe;
            --slate:       #64748b;
            --slate-light: #94a3b8;
            --border:      #e2e8f0;
            --bg:          #f5f7fa;
            --white:       #ffffff;
            --text:        #1e293b;
            --radius:      10px;
            --shadow:      0 1px 3px rgba(0,0,0,0.06), 0 4px 14px rgba(0,0,0,0.05);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.65;
            font-size: 15px;
            -webkit-font-smoothing: antialiased;
        }

        a { text-decoration: none; color: inherit; }

        /* ─── NAVBAR ─────────────────────────────── */
        .navbar {
            background: var(--navy);
            position: sticky;
            top: 0;
            z-index: 200;
            border-bottom: 1px solid rgba(255,255,255,0.06);
        }

        .nav-inner {
            max-width: 1080px;
            margin: 0 auto;
            padding: 0 1.75rem;
            height: 58px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .nav-brand {
            font-family: 'DM Serif Display', serif;
            font-size: 1.2rem;
            color: var(--white);
            letter-spacing: 0.3px;
        }

        .nav-brand span { color: #93bbfc; }

        .nav-links {
            list-style: none;
            display: flex;
            gap: 0.2rem;
        }

        .nav-links a {
            color: var(--slate-light);
            font-size: 0.875rem;
            font-weight: 500;
            padding: 0.4rem 0.9rem;
            border-radius: 6px;
            transition: background 0.15s, color 0.15s;
        }

        .nav-links a:hover,
        .nav-links a.active {
            background: rgba(255,255,255,0.09);
            color: var(--white);
        }

        /* ─── LAYOUT ─────────────────────────────── */
        .container {
            max-width: 1080px;
            margin: 2.5rem auto;
            padding: 0 1.75rem;
        }

        /* ─── PAGE HEADER ────────────────────────── */
        .page-header {
            margin-bottom: 2rem;
        }

        .page-header .breadcrumb {
            display: flex;
            align-items: center;
            gap: 0.4rem;
            font-size: 0.8rem;
            color: var(--slate-light);
            margin-bottom: 0.6rem;
        }

        .page-header .breadcrumb a {
            color: var(--blue);
            font-weight: 500;
        }

        .page-header .breadcrumb a:hover { text-decoration: underline; }

        .page-header h1 {
            font-family: 'DM Serif Display', serif;
            font-size: 1.85rem;
            color: var(--navy);
            line-height: 1.2;
            margin-bottom: 0.35rem;
        }

        .page-header p {
            color: var(--slate);
            font-size: 0.92rem;
        }

        /* ─── CARD ───────────────────────────────── */
        .card {
            background: var(--white);
            border-radius: var(--radius);
            border: 1px solid var(--border);
            box-shadow: var(--shadow);
        }

        /* ─── BADGE ──────────────────────────────── */
        .badge {
            display: inline-block;
            padding: 0.2rem 0.65rem;
            border-radius: 999px;
            font-size: 0.7rem;
            font-weight: 700;
            letter-spacing: 0.4px;
            text-transform: uppercase;
            color: white;
        }

        /* ─── BUTTONS ────────────────────────────── */
        .btn {
            display: inline-block;
            padding: 0.6rem 1.4rem;
            border-radius: 7px;
            font-size: 0.875rem;
            font-weight: 600;
            border: none;
            cursor: pointer;
            transition: all 0.15s;
            font-family: 'DM Sans', sans-serif;
        }

        .btn-primary {
            background: var(--blue);
            color: white;
        }
        .btn-primary:hover { background: var(--blue-hover); }

        .btn-outline {
            background: transparent;
            color: var(--slate);
            border: 1px solid var(--border);
        }
        .btn-outline:hover { background: var(--bg); }

        /* ─── DIVIDER ────────────────────────────── */
        hr.divider {
            border: none;
            border-top: 1px solid var(--border);
            margin: 1.25rem 0;
        }

        /* ─── FOOTER ─────────────────────────────── */
        .footer {
            background: var(--navy);
            color: #475569;
            text-align: center;
            padding: 1.4rem;
            font-size: 0.8rem;
            margin-top: 5rem;
        }

        .footer strong { color: #93bbfc; }

        /* ─── RESPONSIVE ─────────────────────────── */
        @media (max-width: 640px) {
            .nav-brand { font-size: 1rem; }
            .nav-links a { padding: 0.35rem 0.55rem; font-size: 0.8rem; }
            .container { padding: 0 1rem; margin: 1.5rem auto; }
            .page-header h1 { font-size: 1.5rem; }
        }
    </style>
    {% block extra_css %}{% endblock %}
</head>
<body>

<nav class="navbar">
    <div class="nav-inner">
        <a href="{% url 'katalog:homepage' %}" class="nav-brand">Toko<span>Kita</span></a>
        <ul class="nav-links">
            <li><a href="{% url 'katalog:homepage' %}"      {% if request.resolver_match.url_name == 'homepage'      %}class="active"{% endif %}>Beranda</a></li>
            <li><a href="{% url 'katalog:daftar_produk' %}" {% if 'produk' in request.resolver_match.url_name        %}class="active"{% endif %}>Produk</a></li>
            <li><a href="{% url 'katalog:kontak' %}"        {% if request.resolver_match.url_name == 'kontak'        %}class="active"{% endif %}>Kontak</a></li>
        </ul>
    </div>
</nav>

<main>
    <div class="container">
        {% block content %}{% endblock %}
    </div>
</main>

<footer class="footer">
    <p>&copy; 2024 <strong>TokoKita</strong> &mdash; Dibuat dengan Django untuk Tugas Praktikum</p>
</footer>

</body>
</html>
